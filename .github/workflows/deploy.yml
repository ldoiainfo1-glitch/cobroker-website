name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:         # allow manual trigger from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  # ─── Supabase Migrations ────────────────────────────────────────────────────
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          supabase db push \
            --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ─── Backend → AWS EC2 ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: migrate          # only deploy after migrations pass
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/dist/,backend/package.json,backend/package-lock.json,backend/ecosystem.config.cjs"
          target: "/home/${{ secrets.EC2_USER }}/cobrokings"
          strip_components: 0

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/cobrokings/backend

            # Install only production dependencies
            npm ci --omit=dev

            # Create log directory if it doesn't exist
            mkdir -p /var/log/cobrokings

            # Reload (zero-downtime) or start fresh
            if pm2 list | grep -q cobrokings-api; then
              pm2 reload cobrokings-api --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save
            echo "✅ Backend deployed successfully"

  # ─── Frontend → Vercel ──────────────────────────────────────────────────────
  # Vercel auto-deploys on every push to main via its GitHub integration.
  # This job exists to surface the Vercel deployment URL in the workflow summary
  # and to block merges if the Vercel preview fails.
  deploy-frontend:
    name: Verify Vercel Deployment
    runs-on: ubuntu-latest
    needs: []              # runs in parallel with migrate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AWS_REGION: us-east-1
          VITE_AWS_S3_BUCKET: cobroking-media

      - name: Deploy to Vercel (production)
        id: vercel-deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Print deployment URL
        run: echo "🚀 Deployed to ${{ steps.vercel-deploy.outputs.url }}"
