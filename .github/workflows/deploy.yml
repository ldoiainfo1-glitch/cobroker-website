name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:         # allow manual trigger from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  # ─── Supabase Migrations ────────────────────────────────────────────────────
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        continue-on-error: true   # migrations may already be applied; don't block deploy
        run: |
          supabase link --project-ref ltdjflgoqfmvljiujpct
          supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── Backend → AWS EC2 ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: migrate          # only deploy after migrations pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/dist/,backend/package.json,backend/package-lock.json,backend/ecosystem.config.cjs"
          target: "/home/${{ secrets.EC2_USER }}/cobrokings"
          strip_components: 0

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/cobrokings/backend

            # Install only production dependencies
            npm ci --omit=dev

            # Create log directory if it doesn't exist
            sudo mkdir -p /var/log/cobrokings
            sudo chown $USER:$USER /var/log/cobrokings

            # Reload (zero-downtime) or start fresh
            if pm2 list | grep -q cobrokings-api; then
              pm2 reload cobrokings-api --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save
            echo "✅ Backend deployed successfully"

  # ─── Frontend → Vercel ──────────────────────────────────────────────────────
  # Vercel's GitHub integration auto-deploys on every push to main.
  # This job explicitly triggers a production deploy via CLI and prints the URL.
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    # runs in parallel with migrate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        id: vercel-deploy
        run: |
          url=$(vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.vercel-deploy.outputs.url }}"
